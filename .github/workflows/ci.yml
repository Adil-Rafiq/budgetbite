name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PNPM_VERSION: 10.30.3
  NODE_VERSION: '20'

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Typecheck
        run: pnpm check-types

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Format check
        run: pnpm format:check

      # Drift check: regenerates the better-auth schema + drizzle migrations
      # from the current sources and fails if anything in packages/database
      # changed — i.e. someone edited a schema but forgot to run `pnpm db:generate`
      # and commit the resulting migration.
      #
      # drizzle-kit generate doesn't actually connect to the DB, but
      # drizzle.config.ts throws if DIRECT_DATABASE_URL is unset, so we pass
      # a placeholder URL.
      - name: Drizzle drift check
        env:
          DIRECT_DATABASE_URL: postgresql://drift:placeholder@localhost:5432/drift?sslmode=disable
        run: |
          pnpm db:generate
          if [ -n "$(git status --porcelain packages/database)" ]; then
            echo "::error::Schema drift detected — sources changed but the generated migration/auth schema was not committed. Run 'pnpm db:generate' locally and commit the result."
            git status packages/database
            git --no-pager diff packages/database
            exit 1
          fi

  # Applies pending Drizzle migrations to the Neon production branch on every
  # push to main. Runs only after `checks` is green. Render is configured with
  # "Auto-deploy: After CI Checks Pass", so the API will not redeploy until
  # this job finishes successfully — keeping migrations strictly before code.
  migrate:
    name: Migrate Neon prod
    needs: checks
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply migrations
        env:
          DIRECT_DATABASE_URL: ${{ secrets.NEON_PROD_DIRECT_URL }}
        run: pnpm --filter @repo/database db:migrate
